<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#111827" />

  <title>Antrenman Zamanlayıcı</title>

  <!-- iOS APP AYARLARI -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="NAZLIM">
  <link rel="apple-touch-icon" href="icon.png">

  <style>
    :root {
      --bg: #0f172a;
      --card: rgba(255,255,255,0.08);
      --text: #f8fafc;
      --muted: #cbd5e1;
      --shadow: 0 20px 50px rgba(0,0,0,0.25);
      --radius: 24px;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      color: var(--text);
      background: linear-gradient(180deg, #0f172a 0%, #111827 100%);
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: env(safe-area-inset-top) 20px env(safe-area-inset-bottom);
      min-height: 100vh;
      transition: background 0.35s ease;
    }

    body.state-idle {
      background: linear-gradient(180deg, #111827 0%, #1f2937 100%);
    }

    body.state-work {
      background: linear-gradient(180deg, #14532d 0%, #166534 100%);
    }

    body.state-rest {
      background: linear-gradient(180deg, #1e3a8a 0%, #2563eb 100%);
    }

    .app {
      width: 100%;
      max-width: 460px;
      height: calc(100vh - 40px);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      background: var(--card);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 22px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 28px;
      text-align: center;
    }

    .subtitle {
      margin: 0 0 22px;
      text-align: center;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.45;
    }

    .inputs {
      display: grid;
      gap: 14px;
      margin-bottom: 18px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    label {
      font-weight: 700;
      font-size: 14px;
    }

    input {
      width: 100%;
      padding: 16px;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.14);
      background: rgba(255,255,255,0.08);
      color: var(--text);
      font-size: 18px;
      outline: none;
    }

    .timer-box {
      margin: 18px 0 16px;
      border-radius: 22px;
      padding: 22px 18px;
      text-align: center;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
    }

    .phase {
      font-size: 16px;
      font-weight: 800;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .time {
      font-size: 72px;
      font-weight: 900;
    }

    .hint {
      color: var(--muted);
      font-size: 14px;
      min-height: 20px;
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    button {
      border: none;
      border-radius: 18px;
      padding: 15px;
      font-size: 16px;
      font-weight: 800;
    }

    .start-btn {
      background: white;
      color: #111827;
      grid-column: 1 / -1;
    }

    .secondary {
      background: rgba(255,255,255,0.12);
      color: white;
    }

    .danger {
      background: rgba(220, 38, 38, 0.9);
      color: white;
    }

    .hidden {
      display: none;
    }
  </style>
</head>

<body class="state-idle">

<main class="app">

<div>
<h1>Evde Zımba Timer</h1>

<div class="inputs">
  <div class="field">
    <label>Spor süresi</label>
    <input id="workInput" type="number" value="40">
  </div>

  <div class="field">
    <label>Dinlenme süresi</label>
    <input id="restInput" type="number" value="20">
  </div>
</div>

<div class="timer-box">
  <div class="phase" id="phaseLabel">Hazır</div>
  <div class="time" id="timeDisplay">00</div>
  <div class="hint" id="hintText"></div>
</div>
</div>

<div class="actions">
  <button class="start-btn" id="startBtn">Başlat</button>
  <button class="secondary hidden" id="pauseBtn">Duraklat</button>
  <button class="danger hidden" id="resetBtn">Sıfırla</button>
</div>

</main>

<script>
let audioContext = null;

// iOS SES FIX
function initAudio() {
  const AudioContextClass = window.AudioContext || window.webkitAudioContext;
  if (!audioContext) {
    audioContext = new AudioContextClass();
  }
  if (audioContext.state === 'suspended') {
    audioContext.resume();
  }
}

// TOUCH FIX
document.body.addEventListener('touchstart', initAudio, { once: true });

function beep(freq = 800, dur = 0.2) {
  if (!audioContext) return;

  const osc = audioContext.createOscillator();
  const gain = audioContext.createGain();

  osc.frequency.value = freq;
  gain.gain.value = 0.2;

  osc.connect(gain);
  gain.connect(audioContext.destination);

  osc.start();
  osc.stop(audioContext.currentTime + dur);
}

const body = document.body;
const startBtn = document.getElementById("startBtn");
const pauseBtn = document.getElementById("pauseBtn");
const resetBtn = document.getElementById("resetBtn");

let interval;
let timeLeft = 0;
let phase = "idle";
let work, rest;
let running = false;

function updateUI() {
  body.className = "state-" + phase;
  document.getElementById("timeDisplay").innerText = String(timeLeft).padStart(2,"0");

  if (phase === "work") {
    document.getElementById("phaseLabel").innerText = "Spor Süresi";
  } else if (phase === "rest") {
    document.getElementById("phaseLabel").innerText = "Dinlenme Süresi";
  } else {
    document.getElementById("phaseLabel").innerText = "Hazır";
  }
}

function start() {
  initAudio();

  work = parseInt(document.getElementById("workInput").value);
  rest = parseInt(document.getElementById("restInput").value);

  phase = "work";
  timeLeft = work;
  running = true;

  startBtn.classList.add("hidden");
  pauseBtn.classList.remove("hidden");
  resetBtn.classList.remove("hidden");

  interval = setInterval(tick, 1000);
  updateUI();
}

function tick() {
  timeLeft--;

  if (timeLeft <= 3 && timeLeft > 0) beep(1200, 0.1);

  if (timeLeft <= 0) {
    if (phase === "work") {
      phase = "rest";
      timeLeft = rest;
      beep(500, 0.3);
    } else {
      phase = "work";
      timeLeft = work;
      beep(900, 0.3);
    }
  }

  updateUI();
}

function pause() {
  if (running) {
    clearInterval(interval);
    running = false;
    pauseBtn.innerText = "Devam Et";
  } else {
    interval = setInterval(tick, 1000);
    running = true;
    pauseBtn.innerText = "Duraklat";
  }
}

function reset() {
  clearInterval(interval);
  phase = "idle";
  timeLeft = 0;
  running = false;

  startBtn.classList.remove("hidden");
  pauseBtn.classList.add("hidden");
  resetBtn.classList.add("hidden");

  updateUI();
}

startBtn.onclick = start;
resetBtn.onclick = reset;
pauseBtn.onclick = pause;

updateUI();
</script>

</body>
</html>
